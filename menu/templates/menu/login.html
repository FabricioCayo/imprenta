<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-200 flex justify-center items-center h-screen">

    <div class="bg-white p-10 rounded shadow w-96">

        <h1 class="text-3xl font-bold mb-6 text-center">
            Iniciar Sesión
        </h1>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="w-full bg-blue-600 text-white p-2 rounded mt-4"
            >
                Entrar
            </button>

        </form>

    </div>

</body>
</html>
