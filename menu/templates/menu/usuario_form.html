{% extends 'menu/base.html' %}

{% block content %}

<div class="bg-white p-5 sm:p-8 rounded-xl shadow max-w-2xl mx-auto w-full">

    <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-4 sm:mb-6">
        Crear Usuario
    </h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg mt-4 w-full sm:w-auto"
        >
            Guardar
        </button>

    </form>

</div>

{% endblock %}
