{% extends 'menu/base.html' %}

{% block content %}

<div class="bg-white p-8 rounded-xl shadow max-w-2xl mx-auto">

    <h1 class="text-4xl font-bold mb-6">
        Crear Usuario
    </h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="bg-blue-600 text-white px-6 py-3 rounded mt-4"
        >
            Guardar
        </button>

    </form>

</div>

{% endblock %}
