{% extends 'menu/base.html' %}

{% block content %}

<div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6 md:mb-8">

    <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold">
        Usuarios
    </h1>

    <a
        href="{% url 'crear_usuario' %}"
        class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg text-center w-full sm:w-auto"
    >
        Nuevo Usuario
    </a>

</div>

<div class="bg-white rounded-xl shadow overflow-x-auto">

    <table class="w-full min-w-[640px]">

        <thead class="bg-gray-800 text-white">

            <tr>

                <th class="p-3 sm:p-4 text-left text-sm sm:text-base">
                    Usuario
                </th>

                <th class="p-3 sm:p-4 text-left text-sm sm:text-base">
                    Email
                </th>

                <th class="p-3 sm:p-4 text-left text-sm sm:text-base">
                    Rol
                </th>

                <th class="p-3 sm:p-4 text-left text-sm sm:text-base">
                    Acciones
                </th>

            </tr>

        </thead>

        <tbody>

            {% for usuario in usuarios %}

                <tr class="border-b">

                    <td class="p-3 sm:p-4 text-sm sm:text-base">
                        {{ usuario.username }}
                    </td>

                    <td class="p-3 sm:p-4 text-sm sm:text-base">
                        {{ usuario.email }}
                    </td>

                    <td class="p-3 sm:p-4 text-sm sm:text-base">

                        {% for grupo in usuario.groups.all %}
                            {{ grupo.name }}
                        {% endfor %}

                    </td>

                    <td class="p-3 sm:p-4 flex flex-col sm:flex-row gap-2">

                        <a
                            href="{% url 'editar_usuario' usuario.id %}"
                            class="bg-yellow-500 text-white px-4 py-2 rounded"
                        >
                            Editar
                        </a>

                        <a
                            href="{% url 'eliminar_usuario' usuario.id %}"
                            class="bg-red-600 text-white px-4 py-2 rounded"
                        >
                            Eliminar
                        </a>

                    </td>

                </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
