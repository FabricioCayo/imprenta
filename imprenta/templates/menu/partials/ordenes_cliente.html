<div class="ordenes-grid grid grid-cols-1 gap-5 sm:gap-8 sm:grid-cols-2 xl:grid-cols-3 w-full max-w-[1600px] mx-auto px-2 sm:px-6 md:px-10">

    {% for orden in ordenes %}

        <div
            class="orden-card w-full min-h-[240px] sm:min-h-[280px] rounded-2xl sm:rounded-3xl p-6 sm:p-8 md:p-10 flex flex-col justify-between shadow-lg
            {% if orden.estado == 'revision' %}
                bg-gray-600
            {% elif orden.estado == 'recepcion' %}
                bg-blue-600
            {% elif orden.estado == 'diseno' %}
                bg-yellow-500
            {% elif orden.estado == 'corte' %}
                bg-orange-500
            {% elif orden.estado == 'finalizado' %}
                bg-green-600
            {% endif %}
            "
            data-id="{{ orden.id }}"
            data-estado="{{ orden.estado }}"
            data-inicio="{{ orden.fecha_inicio|date:'c' }}"
            data-tiempo="{{ orden.tiempo_estimado }}"
        >

            <div>
                <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-3 sm:mb-4 leading-tight">
                    {{ orden.empresa }}
                </h2>

                <p class="text-xl md:text-2xl estado-texto font-semibold">
                    {{ orden.get_estado_display }}
                </p>

                <p class="text-lg md:text-xl mt-4 text-white/90">
                    Cliente: {{ orden.cliente }}
                </p>
            </div>

            <div class="contador text-3xl md:text-4xl font-bold mt-8 text-center break-words">
                {% if orden.estado == 'finalizado' %}
                    LISTO
                {% endif %}
            </div>

        </div>

    {% empty %}

        <p class="col-span-full text-center text-2xl text-gray-500 py-20">
            No hay órdenes activas en este momento
        </p>

    {% endfor %}

</div>
